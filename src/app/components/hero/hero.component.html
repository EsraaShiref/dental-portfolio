<section id="hero" class="relative pt-24 pb-32 md:pt-36 md:pb-40 overflow-hidden">
  <!-- Radial gradient background -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-secondary/10 via-background to-background -z-10"></div>

  <div class="container mx-auto px-4 md:px-6">
    <div class="flex flex-col md:flex-row items-center gap-12 md:gap-20">
      <!-- Left: Text -->
      <div class="flex-1 space-y-6 text-center md:text-left">
        <!-- Badge -->
        <div>
          <span class="inline-block px-4 py-1.5 text-sm font-medium border border-secondary/30 text-secondary bg-secondary/5 rounded-full">
            General Dentist | Tanta, Egypt
          </span>
        </div>

        <!-- Heading -->
        <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold leading-[1.1] text-foreground">
          Precision
          <span class="text-secondary italic font-serif">Care</span>
          ,<br />
          Confident Smiles.
        </h1>

        <!-- Description -->
        <p class="text-lg md:text-xl text-muted-foreground max-w-2xl mx-auto md:mx-0 leading-relaxed">
          Driven by the philosophy of
          <strong class="text-foreground font-semibold">CCC — Complete Comprehensive Care</strong>
          . Providing meticulous, patient-centered dentistry from diagnosis to final restoration.
        </p>

        <!-- CTAs -->
        <div class="flex flex-col sm:flex-row items-center gap-4 pt-4 justify-center md:justify-start">
          <button
            (click)="scrollTo('portfolio')"
            class="w-full sm:w-auto rounded-full px-8 py-3 text-base font-medium bg-primary text-primary-foreground hover:opacity-90 shadow-lg hover:shadow-xl transition-all"
          >
            View My Work
          </button>
          <a
            [href]="waLink"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex items-center justify-center gap-2 w-full sm:w-auto rounded-full px-8 py-3 text-base font-medium border border-border bg-background hover:bg-muted text-foreground transition-all shadow-sm hover:shadow-md"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" class="w-[18px] h-[18px]" style="color: #25D366;">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Contact via WhatsApp
          </a>
        </div>
      </div>

      <!-- Right: Image -->
      <div class="flex-1 relative">
        <div class="relative w-72 h-72 md:w-[450px] md:h-[450px] mx-auto">
          <!-- Glow -->
          <div class="absolute inset-0 rounded-full bg-secondary/10 animate-pulse blur-3xl"></div>
          <!-- Rings -->
          <div class="absolute inset-4 rounded-full border border-secondary/20 z-0"></div>
          <div class="absolute inset-8 rounded-full border border-primary/10 z-0"></div>
          <!-- Profile Image -->
          <img
            src="assets/ahmed-profile.png"
            alt="Dr. Ahmed Wagdy Salama"
            class="relative z-10 w-full h-full object-cover rounded-full shadow-2xl border-4 border-background animate-float"
          />
          <!-- Badge Card -->
          <div class="absolute bottom-4 -right-4 md:bottom-10 md:-right-10 bg-background rounded-xl p-4 shadow-xl border border-border/50 z-20">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-accent/20 flex items-center justify-center text-accent">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                  <path d="M9 3.75H6.912a2.25 2.25 0 00-2.15 1.588L2.35 13.177a2.25 2.25 0 00-.1.661V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 00-2.15-1.588H15M2.25 13.5h3.86a2.25 2.25 0 012.012 1.244l.256.512a2.25 2.25 0 002.013 1.244h3.218a2.25 2.25 0 002.013-1.244l.256-.512a2.25 2.25 0 012.013-1.244h3.859M12 3v8.25m0 0l-3-3m3 3l3-3"/>
                </svg>
              </div>
              <div>
                <p class="text-sm font-bold">Delta University</p>
                <p class="text-xs text-muted-foreground">BDS Graduate</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
