<div class="slider-card">
  <!-- Header -->
  <div class="slider-header">
    <span class="case-num">Case #{{ caseNumber }}</span>
    <span class="drag-hint">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8L22 12L18 16M6 8L2 12L6 16M2 12H22"/>
      </svg>
      Drag to compare
    </span>
  </div>

  <!-- Slider -->
  <div
    #container
    class="slider-container"
    (mousedown)="onMouseDown($event)"
    (touchstart)="onTouchStart($event)"
  >
    <!-- After (background) -->
    <img [src]="after.src" [alt]="after.label" class="img-full" loading="lazy" />

    <!-- Before (clipped) -->
    <div class="before-clip" [style.clip-path]="'inset(0 ' + (100 - pos()) + '% 0 0)'">
      <img [src]="before.src" [alt]="before.label" class="img-full" loading="lazy" />
    </div>

    <!-- Divider -->
    <div class="divider" [style.left]="pos() + '%'">
      <div class="knob">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8L22 12L18 16M6 8L2 12L6 16M2 12H22"/>
        </svg>
      </div>
    </div>

    <!-- Labels -->
    <div class="label label-before">Before</div>
    <div class="label label-after">After</div>

    <!-- Zoom buttons -->
    <button class="zoom-btn zoom-left" (click)="$event.stopPropagation(); beforeClick.emit()" title="View Before">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
      </svg>
    </button>
    <button class="zoom-btn zoom-right" (click)="$event.stopPropagation(); afterClick.emit()" title="View After">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
      </svg>
    </button>
  </div>
</div>
