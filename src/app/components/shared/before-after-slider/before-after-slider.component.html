<div class="flex flex-col gap-0 rounded-xl overflow-hidden border border-primary-foreground/10 bg-primary-foreground/5 shadow-md">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-2 bg-primary-foreground/10 border-b border-primary-foreground/10">
    <span class="text-xs font-semibold text-primary-foreground/80">Case #{{ caseNumber }}</span>
    <span class="flex items-center gap-1 text-[10px] text-primary-foreground/50">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8 22 12 18 16M6 8 2 12 6 16M2 12H22"/>
      </svg>
      Drag to compare
    </span>
  </div>

  <!-- Slider -->
  <div
    #container
    class="relative aspect-[4/3] overflow-hidden select-none cursor-col-resize"
    (mousedown)="onMouseDown($event)"
    (touchstart)="onTouchStart($event)"
  >
    <!-- After -->
    <img [src]="after.src" [alt]="after.label" class="absolute inset-0 w-full h-full object-cover pointer-events-none" loading="lazy" />

    <!-- Before (clipped) -->
    <div class="absolute inset-0 pointer-events-none" [style.clip-path]="'inset(0 ' + (100 - pos()) + '% 0 0)'">
      <img [src]="before.src" [alt]="before.label" class="absolute inset-0 w-full h-full object-cover" loading="lazy" />
    </div>

    <!-- Divider -->
    <div
      class="absolute top-0 bottom-0 w-0.5 bg-white/90 shadow-[0_0_8px_rgba(0,0,0,0.5)] pointer-events-none"
      [style.left]="pos() + '%'"
      style="transform: translateX(-50%);"
    >
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white shadow-xl flex items-center justify-center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-primary">
          <path d="M18 8 22 12 18 16M6 8 2 12 6 16M2 12H22"/>
        </svg>
      </div>
    </div>

    <!-- Labels -->
    <div class="absolute top-3 left-3 pointer-events-none">
      <span class="bg-black/60 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">Before</span>
    </div>
    <div class="absolute top-3 right-3 pointer-events-none">
      <span class="bg-secondary/80 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">After</span>
    </div>

    <!-- Zoom buttons -->
    <button
      class="absolute bottom-3 left-3 w-7 h-7 rounded-full bg-black/40 hover:bg-black/60 flex items-center justify-center text-white/70 hover:text-white transition-all z-10"
      (click)="$event.stopPropagation(); beforeClick.emit()"
      title="View Before"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
      </svg>
    </button>
    <button
      class="absolute bottom-3 right-3 w-7 h-7 rounded-full bg-black/40 hover:bg-black/60 flex items-center justify-center text-white/70 hover:text-white transition-all z-10"
      (click)="$event.stopPropagation(); afterClick.emit()"
      title="View After"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
      </svg>
    </button>
  </div>
</div>
