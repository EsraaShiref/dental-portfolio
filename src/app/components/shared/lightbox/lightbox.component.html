<div class="fixed inset-0 z-[100] bg-black/95 overflow-y-auto" @fadeIn (click)="close.emit()">
  <!-- Close -->
  <button
    class="fixed top-4 right-4 text-white/70 hover:text-white p-2 rounded-full bg-white/10 hover:bg-white/20 transition-all z-10"
    (click)="close.emit()"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>

  <!-- Prev / Next -->
  @if (images.length > 1) {
    <button
      class="fixed left-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white p-3 rounded-full bg-white/10 hover:bg-white/20 transition-all z-10"
      (click)="prev($event)"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <button
      class="fixed right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white p-3 rounded-full bg-white/10 hover:bg-white/20 transition-all z-10"
      (click)="next($event)"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>
  }

  <!-- Content -->
  <div class="min-h-screen flex items-center justify-center px-4 py-8" (click)="$event.stopPropagation()">
    <div class="flex flex-col items-center gap-4 max-w-5xl">
      @if (images[current()]) {
        <img
          @imgAnim
          [src]="images[current()].src"
          [alt]="images[current()].label"
          class="max-h-[85vh] max-w-full object-contain rounded-lg shadow-2xl"
        />
        <p class="text-white/80 text-sm font-medium">
          {{ images[current()].label }} — {{ current() + 1 }} / {{ images.length }}
        </p>
      }
    </div>
  </div>
</div>
