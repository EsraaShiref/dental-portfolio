<div class="lb-overlay" @fadeIn (click)="close.emit()">
  <!-- Close -->
  <button class="lb-close" (click)="close.emit()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>

  <!-- Prev -->
  @if (images.length > 1) {
    <button class="lb-nav lb-prev" (click)="prev($event)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m15 18-6-6 6-6"/>
      </svg>
    </button>
    <button class="lb-nav lb-next" (click)="next($event)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>
  }

  <!-- Image -->
  <div class="lb-content" (click)="$event.stopPropagation()">
    @if (images[current()]) {
      <img
        @imgAnim
        [src]="images[current()].src"
        [alt]="images[current()].label"
        class="lb-img"
      />
      <p class="lb-caption">
        {{ images[current()].label }} — {{ current() + 1 }} / {{ images.length }}
      </p>
    }
  </div>
</div>
