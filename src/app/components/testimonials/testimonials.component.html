<section class="py-24 bg-muted/20 overflow-hidden reveal">
  <!-- Header -->
  <div class="max-w-7xl mx-auto px-4 md:px-6 mb-14 reveal">
    <div class="text-center">
      <h2 class="text-3xl md:text-4xl font-bold mb-4">Patient Stories</h2>
      <div class="w-20 h-1 bg-secondary mx-auto rounded-full mb-5"></div>
      <p class="text-muted-foreground max-w-xl mx-auto">
        Real feedback from patients who experienced precision, care, and comfort first-hand.
      </p>
    </div>
  </div>

  <!-- Carousel -->
  <div
    class="overflow-hidden w-full reveal reveal-none reveal-xslow"
    style="transition-delay: 0.2s"
    (mouseenter)="onEnter()"
    (mouseleave)="onLeave()"
    (mousedown)="onPointerDown($event)"
    (mousemove)="onPointerMove($event)"
    (mouseup)="onPointerUp()"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onPointerUp()"
  >
    <div class="flex gap-6 pb-2 will-change-transform" #track>
      @for (item of triple; track $index) {
        <div class="shrink-0 w-[min(85vw,320px)] sm:w-[340px] lg:w-[380px] bg-background rounded-2xl border border-border/60 shadow-md p-6 flex flex-col gap-4 select-none">
          <!-- Stars -->
          <div class="flex items-center gap-0.5">
            @for (s of stars; track s) {
              <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-amber-400">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            }
          </div>
          <!-- Review -->
          <p class="text-sm text-muted-foreground leading-relaxed flex-1">&ldquo;{{ item.review }}&rdquo;</p>
          <!-- Author -->
          <div class="flex items-center gap-3 pt-2 border-t border-border/40">
            <div class="w-10 h-10 rounded-full bg-secondary/15 border border-secondary/25 flex items-center justify-center shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-5 h-5 text-secondary">
                <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
              </svg>
            </div>
            <div>
              <p class="text-sm font-semibold text-foreground">{{ item.name }}</p>
              <p class="text-xs text-muted-foreground">{{ item.title }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
