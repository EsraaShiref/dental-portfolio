<section class="testimonials reveal">
  <div class="container">
    <div class="section-header">
      <h2>Patient Stories</h2>
      <div class="divider"></div>
      <p>Real feedback from patients who experienced precision, care, and comfort first-hand.</p>
    </div>
  </div>

  <div
    class="carousel-wrap"
    (mouseenter)="onEnter()"
    (mouseleave)="onLeave()"
    (touchstart)="onEnter()"
    (touchend)="onLeave()"
    (mousedown)="onPointerDown($event)"
    (mousemove)="onPointerMove($event)"
    (mouseup)="onPointerUp()"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onPointerUp()"
  >
    <div class="carousel-track" #track>
      @for (item of triple; track $index) {
        <div class="carousel-card card">
          <div class="stars">
            @for (s of stars; track s) {
              <svg width="16" height="16" viewBox="0 0 20 20" fill="#f59e0b">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            }
          </div>
          <p class="review">&ldquo;{{ item.review }}&rdquo;</p>
          <div class="author">
            <div class="author-avatar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
              </svg>
            </div>
            <div>
              <p class="author-name">{{ item.name }}</p>
              <p class="author-title">{{ item.title }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
